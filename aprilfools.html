<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorry To You - Demo</title>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f5f3e8;

            color: #2a2a2a;
            font-family: 'Times New Roman', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            line-height: 1.7;
        }

        .player {
            background: rgba(255, 255, 255, 0.68);
            border: 1.5px solid #d4c4a0;
            border-radius: 4px;
            padding: 40px 36px 32px;
            width: 340px;
            text-align: center;
            box-shadow: 0 4px 18px rgba(139,69,19,0.10);
        }

        .song-title {
            font-family: 'Times New Roman', serif;
            font-size: 22px;
            font-weight: bold;
            color: #8B4513;
            margin-bottom: 2px;
            letter-spacing: 0.01em;
        }

        .song-sub {
            font-family: 'Courier Prime', monospace;
            font-size: 12px;
            color: #A0522D;
            margin-bottom: 28px;
            text-transform: uppercase;
            letter-spacing: 0.12em;
        }

        .progress-container {
            width: 100%;
            background: #d4c4a0;
            border-radius: 2px;
            height: 4px;
            margin-bottom: 8px;
            cursor: pointer;
            position: relative;
        }

        .progress-bar {
            background: #8B4513;
            height: 4px;
            border-radius: 2px;
            width: 0%;
            transition: width 0.1s linear;
        }

        .time-labels {
            display: flex;
            justify-content: space-between;
            font-family: 'Courier Prime', monospace;
            font-size: 11px;
            color: #666;
            margin-bottom: 28px;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 24px;
        }

        .play-btn {
            background: #8B4513;
            color: #f5f3e8;
            border: none;
            border-radius: 50%;
            width: 56px;
            height: 56px;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s, transform 0.1s;
            font-family: 'Courier Prime', monospace;
        }

        .play-btn:hover {
            background: #A0522D;
            transform: scale(1.05);
        }

        .skip-btn {
            background: none;
            border: none;
            color: #CD853F;
            font-size: 18px;
            cursor: pointer;
            opacity: 0.8;
            font-family: 'Courier Prime', monospace;
        }

        .skip-btn:hover {
            opacity: 1;
            color: #8B4513;
        }
    </style>
</head>
<body>
    <div class="player">
        <div class="song-title">Sorry To You</div>
        <div class="song-sub">a new song demo by Luca DiGrigoli, availabile here until april 2, 2026</div>

        <div class="progress-container" id="progressContainer">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="time-labels">
            <span id="currentTime">0:00</span>
            <span id="totalTime">0:00</span>
        </div>

        <div class="controls">
            <button class="skip-btn" onclick="skip(-10)">-10s</button>
            <button class="play-btn" id="playBtn" onclick="togglePlay()">&#9654;</button>
            <button class="skip-btn" onclick="skip(10)">+10s</button>
        </div>

        <audio id="audio" src="aprilfool/sorrytoyoudemo.mp3"></audio>
    </div>

    <script>
        const audio = document.getElementById('audio');
        const playBtn = document.getElementById('playBtn');
        const progressBar = document.getElementById('progressBar');
        const progressContainer = document.getElementById('progressContainer');
        const currentTimeEl = document.getElementById('currentTime');
        const totalTimeEl = document.getElementById('totalTime');

        function togglePlay() {
            if (audio.paused) {
                audio.play();
                playBtn.innerHTML = '&#9646;&#9646;';
            } else {
                audio.pause();
                playBtn.innerHTML = '&#9654;';
            }
        }

        function skip(seconds) {
            audio.currentTime = Math.min(Math.max(0, audio.currentTime + seconds), audio.duration);
        }

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        audio.addEventListener('timeupdate', () => {
            if (audio.duration) {
                progressBar.style.width = (audio.currentTime / audio.duration * 100) + '%';
                currentTimeEl.textContent = formatTime(audio.currentTime);
            }
        });

        audio.addEventListener('loadedmetadata', () => {
            totalTimeEl.textContent = formatTime(audio.duration);
        });

        audio.addEventListener('ended', () => {
            playBtn.innerHTML = '&#9654;';
        });

        progressContainer.addEventListener('click', (e) => {
            const rect = progressContainer.getBoundingClientRect();
            const ratio = (e.clientX - rect.left) / rect.width;
            audio.currentTime = ratio * audio.duration;
        });
    </script>
</body>
</html>
