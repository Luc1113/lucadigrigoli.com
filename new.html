<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Beautiful Girl - Luca DiGrigoli</title>
    <meta name="description" content='Listen to "Beautiful Girl" by Luca DiGrigoli on all platforms' />

    <meta property="og:title" content="Beautiful Girl - Luca DiGrigoli" />
    <meta property="og:description" content="Out now on all platforms!" />
    <meta property="og:image" content="https://lucadigrigoli.com/og/beautiful-girl.jpg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root{
            --text-yellow:#ffd84a;
            --text-outline: rgba(0,0,0,0.9);

            --spotify-green:#1DB954;
            --spotify-green-hover:#1ed760;
            --apple-pink:#fc3c44;
            --apple-pink-hover:#ff5a5f;
            --youtube-red:#FF0000;
            --youtube-red-hover:#ff3333;
        }

        html { min-height: 100%; }

        body{
            min-height:100vh;
            overflow-x:hidden;
            color: var(--text-yellow);
            font-family:"EB Garamond", Garamond, "Times New Roman", serif;
            position: relative;
            background: #9fdcff;
        }

        /* Gentle looping sky: day -> sunset -> night -> sunset -> day */
        body::before{
            content:"";
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background:
                radial-gradient(900px 560px at 50% 72%, rgba(255, 148, 69, 0.82), rgba(255, 148, 69, 0) 60%),
                radial-gradient(700px 460px at 76% 28%, rgba(191, 123, 255, 0.48), rgba(191, 123, 255, 0) 62%),
                radial-gradient(850px 520px at 22% 22%, rgba(255,255,255,0.72), rgba(255,255,255,0) 58%),
                linear-gradient(180deg,
                    #bfe9ff 0%,
                    #7ecbff 42%,
                    #f7c17b 68%,
                    #f6e4c8 100%
                );
            animation: skyCycle 32s ease-in-out infinite alternate;
        }

        body::after{
            content:"";
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background:
                radial-gradient(900px 560px at 50% 72%, rgba(255, 122, 64, 0.65), rgba(255, 122, 64, 0) 62%),
                radial-gradient(780px 520px at 70% 30%, rgba(126, 75, 190, 0.68), rgba(126, 75, 190, 0) 64%),
                radial-gradient(2px 2px at 18% 24%, rgba(255,255,255,0.9), transparent 55%),
                radial-gradient(1.5px 1.5px at 72% 18%, rgba(255,255,255,0.75), transparent 55%),
                radial-gradient(1.5px 1.5px at 86% 44%, rgba(255,255,255,0.7), transparent 55%),
                radial-gradient(1px 1px at 34% 38%, rgba(255,255,255,0.65), transparent 55%),
                linear-gradient(180deg,
                    #211d4d 0%,
                    #49346f 38%,
                    #c05b70 68%,
                    #f28d5c 100%
                );
            opacity: 0;
            animation: nightCycle 32s ease-in-out infinite alternate;
        }

        @keyframes skyCycle{
            0%   { filter: saturate(1) brightness(1); }
            45%  { filter: saturate(1.12) brightness(1.02); }
            100% { filter: saturate(0.95) brightness(0.75); }
        }

        @keyframes nightCycle{
            0%   { opacity: 0; }
            38%  { opacity: 0.22; }
            68%  { opacity: 0.72; }
            100% { opacity: 0.92; }
        }

        /* Lightweight floating petals */
        .petals {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .petal {
            --scale: 1;
            position: absolute;
            top: -12vh;
            width: 12px;
            height: 8px;
            background: radial-gradient(circle at 30% 30%, rgba(255, 218, 228, 0.86), rgba(255, 145, 177, 0.58));
            border-radius: 55% 45% 55% 12%;
            opacity: 0.48;
            transform: translate3d(0, -12vh, 0) scale(var(--scale)) rotate(0deg);
            animation-name: petalFall;
            animation-timing-function: linear;
            animation-iteration-count: infinite;
            will-change: transform;
        }

        .petal:nth-child(3n) {
            width: 9px;
            height: 6px;
            opacity: 0.38;
            filter: blur(0.25px);
        }

        .petal:nth-child(4n) {
            background: radial-gradient(circle at 30% 30%, rgba(255, 239, 245, 0.8), rgba(255, 174, 200, 0.45));
            opacity: 0.34;
        }

        @keyframes petalFall {
            0% {
                transform: translate3d(0, -12vh, 0) scale(var(--scale)) rotate(0deg);
            }
            25% {
                transform: translate3d(24px, 22vh, 0) scale(var(--scale)) rotate(94deg);
            }
            50% {
                transform: translate3d(-18px, 52vh, 0) scale(var(--scale)) rotate(188deg);
            }
            75% {
                transform: translate3d(18px, 82vh, 0) scale(var(--scale)) rotate(282deg);
            }
            100% {
                transform: translate3d(-4px, 112vh, 0) scale(var(--scale)) rotate(376deg);
            }
        }

        .main-content{
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding: 44px 20px 72px;
            position: relative;
            z-index: 2;
        }

        .album-container{
            text-align:center;
            max-width: 560px;
            width: 100%;
        }

        .outlined{
            color: var(--text-yellow);
            -webkit-text-stroke: 2px var(--text-outline);
            text-shadow:
                0 2px 0 rgba(0,0,0,0.15),
                0 10px 28px rgba(0,0,0,0.18);
        }

        .track-title{
            font-size: 3.25rem;
            font-weight: 700;
            letter-spacing: 0.01em;
            line-height: 1.02;
            margin: 18px 0 10px;
        }

        .artist-name{
            font-family: "Space Mono", monospace;
            font-size: 0.85rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: rgba(0,0,0,0.75);
            background: rgba(255,255,255,0.55);
            display: inline-block;
            padding: 6px 12px;
            border-radius: 999px;
            border: 1px solid rgba(0,0,0,0.1);
            margin-bottom: 22px;
            backdrop-filter: blur(6px);
        }

        .album-art{
            width: 290px;
            height: 290px;
            margin: 0 auto 14px;
            position: relative;
        }

        .album-art img{
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 14px;
            box-shadow:
                0 24px 60px rgba(0, 35, 70, 0.25),
                0 0 0 2px rgba(255,255,255,0.5);
            transition: transform 0.35s ease, box-shadow 0.35s ease;
            background: rgba(255,255,255,0.35);
        }

        .album-art:hover img{
            transform: translateY(-4px) scale(1.015);
            box-shadow:
                0 30px 80px rgba(0, 35, 70, 0.35),
                0 0 0 2px rgba(255,255,255,0.7);
        }

        .out-now-badge{
            display:inline-block;
            background: rgba(255,255,255,0.60);
            color: rgba(0,0,0,0.75);
            padding: 10px 18px;
            border-radius: 999px;
            font-family: "Space Mono", monospace;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            border: 1px solid rgba(0,0,0,0.08);
            box-shadow: 0 12px 30px rgba(0,0,0,0.12);
            margin: 10px 0 22px;
            backdrop-filter: blur(6px);
        }

        .streaming-buttons{
            display:flex;
            flex-direction: column;
            gap: 12px;
            margin: 0 auto;
            width: 100%;
            max-width: 420px;
        }

        .stream-btn{
            display:inline-flex;
            align-items:center;
            justify-content:center;
            gap: 12px;
            padding: 14px 24px;
            border-radius: 999px;
            font-family: "Space Mono", monospace;
            font-size: 0.8rem;
            font-weight: 700;
            text-decoration:none;
            letter-spacing: 0.03em;
            text-transform: uppercase;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.14);
            border: 1px solid rgba(255,255,255,0.35);
            backdrop-filter: blur(6px);
        }

        .stream-btn:hover{ transform: translateY(-2px); }
        .stream-btn:active{ transform: translateY(-1px); }

        .stream-btn svg{ width: 20px; height: 20px; flex-shrink: 0; }

        .stream-btn.spotify{ background: var(--spotify-green); color:#000; }
        .stream-btn.spotify:hover{ background: var(--spotify-green-hover); }

        .stream-btn.apple{ background: linear-gradient(135deg, var(--apple-pink), #fa233b); color:#fff; }
        .stream-btn.apple:hover{ background: linear-gradient(135deg, var(--apple-pink-hover), var(--apple-pink)); }

        .stream-btn.youtube{ background: var(--youtube-red); color:#fff; }
        .stream-btn.youtube:hover{ background: var(--youtube-red-hover); }

        .footer{
            position: fixed;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
        }

        .footer a{
            font-family: "Space Mono", monospace;
            font-size: 0.65rem;
            color: rgba(0,0,0,0.55);
            text-decoration:none;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            background: rgba(255,255,255,0.45);
            border: 1px solid rgba(0,0,0,0.08);
            padding: 8px 12px;
            border-radius: 999px;
            backdrop-filter: blur(6px);
        }

        @media (prefers-reduced-motion: reduce) {
            body::before,
            body::after,
            .petal {
                animation: none;
            }

            body::after { opacity: 0.18; }
        }

        @media (max-width: 768px){
            .album-art{ width: 230px; height: 230px; }
            .track-title{ font-size: 2.3rem; }
            .stream-btn{ font-size: 0.75rem; padding: 13px 18px; }
        }

        @media (max-width: 420px){
            .track-title{ font-size: 1.95rem; }
        }
    </style>
</head>

    </main>

    <footer class="footer">
        <a href="https://lucadigrigoli.com">lucadigrigoli.com</a>
    </footer>

    <script>
        const petalContainer = document.querySelector('.petals');
        const petalCount = 28;

        for (let i = 0; i < petalCount; i++) {
            const petal = document.createElement('span');
            petal.className = 'petal';
            petal.style.left = `${Math.random() * 100}vw`;
            petal.style.setProperty('--scale', (Math.random() * 0.75 + 0.55).toFixed(2));
            petal.style.animationDuration = `${Math.random() * 12 + 18}s`;
            petal.style.animationDelay = `${Math.random() * -28}s`;
            petalContainer.appendChild(petal);
        }
    </script>

</html>
